<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSeva Portal | Secure Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body class="login-page">
    <div class="login-container glass">
        <div class="login-header">
            <div class="logo-box">
                <i class="fa-solid fa-building-columns"></i>
            </div>
            <h1>eSeva Portal</h1>
            <p>Secure Citizen Document Vault</p>
        </div>

        <div id="login-step-1" class="login-step">
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="login-phone" placeholder="+91 98765 43210">
                </div>
            </div>
            <div class="role-selector">
                <label>Login As:</label>
                <div class="role-btns">
                    <button class="role-btn active" data-role="citizen">
                        <i class="fa-solid fa-user"></i> Citizen
                    </button>
                    <button class="role-btn" data-role="franchise">
                        <i class="fa-solid fa-user-gear"></i> Franchise
                    </button>
                </div>
            </div>
            <button id="send-otp-btn" class="main-btn">
                <span>Send OTP</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <div id="login-step-2" class="login-step hidden">
            <div class="otp-message">
                <p>We've sent a code to <br><strong id="display-phone"></strong></p>
                <span class="dev-otp-hint">(Demo OTP: 123456)</span>
            </div>
            <div class="input-group">
                <label for="otp">Enter 6-digit OTP</label>
                <div class="otp-wrapper">
                    <input type="text" maxlength="6" id="login-otp" placeholder="000000">
                </div>
            </div>
            <button id="verify-otp-btn" class="main-btn">
                <span>Verify & Login</span>
                <i class="fa-solid fa-shield-check"></i>
            </button>
            <button id="back-to-phone" class="text-btn">Change Phone Number</button>
        </div>

        <div class="login-footer">
            <p>&copy; 2026 eSeva Digital Services. All rights reserved.</p>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <script src="assets/js/main.js"></script>
</body>
</html>
